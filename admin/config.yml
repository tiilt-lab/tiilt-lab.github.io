backend:
  name: github
  repo: tiilt-lab/tiilt-lab.github.io
  branch: main
  base_url: https://videodev.tiilt-blinc.com
  auth_endpoint: oauth/auth

media_folder: "assets/img/people"
public_folder: "/assets/img/people"

collections:
  # --- Lab Members ---
  - name: "data"
    label: "Site Data"
    files:
      - name: "members"
        label: "Lab Members"
        file: "_data/people.yml"
        description: "Manage current and alumni lab members"
        fields:
          - name: "members"
            label: "Members"
            widget: "list"
            summary: "{{fields.name}} ({{fields.role}} — {{fields.status}})"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - name: "role"
                label: "Role"
                widget: "select"
                options:
                  - { label: "Principal Investigator", value: "pi" }
                  - { label: "Graduate Student", value: "grad" }
                  - { label: "Undergraduate Student", value: "undergrad" }
                  - { label: "Postdoc", value: "postdoc" }
              - name: "status"
                label: "Status"
                widget: "select"
                options:
                  - { label: "Active", value: "active" }
                  - { label: "Alumni", value: "alumni" }
              - name: "alumni_type"
                label: "Alumni Type"
                widget: "select"
                options:
                  - { label: "N/A", value: "" }
                  - { label: "PhD Alumni", value: "phd" }
                  - { label: "Other Alumni", value: "other" }
                default: ""
                required: false
              - { name: "bio", label: "Bio", widget: "text", required: false, default: "" }
              - { name: "photo", label: "Photo", widget: "image", required: false, default: "" }
              - { name: "photo_alt", label: "Photo Alt Text", widget: "string", required: false, default: "" }
              - { name: "website", label: "Website URL", widget: "string", required: false, default: "" }
              - { name: "sort_name", label: "Sort Name (last name for alphabetical ordering)", widget: "string" }

      # --- Projects ---
      - name: "projects"
        label: "Projects"
        file: "_data/projects.yml"
        description: "Manage current and past lab projects"
        fields:
          - name: "projects"
            label: "Projects"
            widget: "list"
            summary: "{{fields.name}} ({{fields.status}})"
            fields:
              - { name: "name", label: "Project Name", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - name: "status"
                label: "Status"
                widget: "select"
                options:
                  - { label: "Current", value: "current" }
                  - { label: "Past", value: "past" }
              - name: "links"
                label: "Links"
                widget: "list"
                required: false
                fields:
                  - { name: "label", label: "Link Label", widget: "string" }
                  - { name: "url", label: "URL", widget: "string" }

      # --- Papers ---
      - name: "papers"
        label: "Papers"
        file: "_data/papers.yml"
        description: "Manage research publications"
        fields:
          - name: "papers"
            label: "Papers"
            widget: "list"
            summary: "{{fields.year}} — {{fields.citation | truncate(80, '...')}}"
            fields:
              - { name: "citation", label: "Full Citation", widget: "text" }
              - { name: "year", label: "Year", widget: "number", value_type: "int" }
              - { name: "project", label: "Project (shows on that project's page)", widget: "select", required: false, default: "", options: ["", "blinc", "sportsense", "sportsensefordata", "minecraft", "multicraft", "famjam", "imr"] }
              - { name: "pdf", label: "PDF File", widget: "file", required: false, default: "", media_folder: "assets/papers", public_folder: "/assets/papers" }
              - { name: "doi", label: "DOI URL", widget: "string", required: false, default: "" }
              - { name: "link", label: "External Link", widget: "string", required: false, default: "" }

  # --- Project pages ---
  - name: "project_pages"
    label: "Project Pages"
    folder: "_projects"
    extension: "md"
    format: "frontmatter"
    create: true
    slug: "{{fields.slug}}"
    summary: "{{title}}"
    editor: { preview: false }
    fields:
      - { name: "layout", widget: "hidden", default: "project" }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "slug", label: "URL slug (becomes /projects/<slug>/)", widget: "string" }
      - { name: "accent", label: "Accent color", widget: "select", default: "purple", options: ["purple", "teal", "blue", "green", "red", "pink", "orange-red", "orange", "yellow"] }
      - name: "sections"
        label: "Sections (first one is the intro; its heading is ignored)"
        widget: "list"
        summary: "{{fields.heading}}"
        fields:
          - { name: "heading", label: "Heading", widget: "string", required: false, default: "" }
          - { name: "body", label: "Text (markdown)", widget: "markdown", required: false, default: "" }
          - name: "buttons"
            label: "Buttons (shown at the top of the card)"
            widget: "list"
            required: false
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "url", label: "URL", widget: "string" }
          - name: "images"
            label: "Images"
            widget: "list"
            required: false
            fields:
              - { name: "src", label: "Image", widget: "image", media_folder: "assets/img/projects", public_folder: "/assets/img/projects" }
              - { name: "alt", label: "Alt text (describe the image)", widget: "string" }
              - { name: "caption", label: "Caption", widget: "string", required: false, default: "" }
          - name: "videos"
            label: "Video embeds"
            widget: "list"
            required: false
            fields:
              - { name: "url", label: "Embed URL (youtube-nocookie.com/embed/...)", widget: "string" }
              - { name: "title", label: "Accessible title", widget: "string" }
              - { name: "caption", label: "Caption shown above the video", widget: "string", required: false, default: "" }

      # --- Classes ---
      - name: "classes"
        label: "Classes"
        file: "_data/classes.yml"
        description: "Manage courses"
        fields:
          - name: "classes"
            label: "Classes"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { name: "title", label: "Course Title", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - name: "objectives"
                label: "Learning Objectives"
                widget: "list"
                required: false
                field: { name: "objective", label: "Objective", widget: "string" }
              - { name: "additional_description", label: "Additional Description", widget: "text", required: false, default: "" }
              - { name: "link", label: "Course Link", widget: "string", required: false, default: "" }

  # --- Blog Posts ---
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "date", label: "Date", widget: "datetime" }
      - { name: "image", label: "Featured Image", widget: "image", required: false }
      - { name: "image_alt", label: "Image Alt Text", widget: "string", required: false, default: "" }
      - { name: "body", label: "Body", widget: "markdown" }
