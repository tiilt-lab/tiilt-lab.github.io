backend:
  name: github
  repo: tiilt-lab/tiilt-lab.github.io
  branch: main
  base_url: https://videodev.tiilt-blinc.com
  auth_endpoint: oauth/auth

media_folder: "assets/img/people"
public_folder: "../assets/img/people"

collections:
  # --- Lab Members ---
  - name: "data"
    label: "Site Data"
    files:
      - name: "members"
        label: "Lab Members"
        file: "_data/people.yml"
        description: "Manage current and alumni lab members"
        fields:
          - name: "members"
            label: "Members"
            widget: "list"
            summary: "{{fields.name}} ({{fields.role}} — {{fields.status}})"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - name: "role"
                label: "Role"
                widget: "select"
                options:
                  - { label: "Principal Investigator", value: "pi" }
                  - { label: "Graduate Student", value: "grad" }
                  - { label: "Undergraduate Student", value: "undergrad" }
                  - { label: "Postdoc", value: "postdoc" }
              - name: "status"
                label: "Status"
                widget: "select"
                options:
                  - { label: "Active", value: "active" }
                  - { label: "Alumni", value: "alumni" }
              - name: "alumni_type"
                label: "Alumni Type"
                widget: "select"
                options:
                  - { label: "N/A", value: "" }
                  - { label: "PhD Alumni", value: "phd" }
                  - { label: "Other Alumni", value: "other" }
                default: ""
                required: false
              - { name: "bio", label: "Bio", widget: "text", required: false, default: "" }
              - { name: "photo", label: "Photo", widget: "image", required: false, default: "" }
              - { name: "photo_alt", label: "Photo Alt Text", widget: "string", required: false, default: "" }
              - { name: "website", label: "Website URL", widget: "string", required: false, default: "" }
              - { name: "sort_name", label: "Sort Name (last name for alphabetical ordering)", widget: "string" }

      # --- Papers ---
      - name: "papers"
        label: "Papers"
        file: "_data/papers.yml"
        description: "Manage research publications"
        fields:
          - name: "papers"
            label: "Papers"
            widget: "list"
            summary: "{{fields.year}} — {{fields.citation | truncate(80, '...')}}"
            fields:
              - { name: "citation", label: "Full Citation", widget: "text" }
              - { name: "year", label: "Year", widget: "number", value_type: "int" }
              - { name: "pdf", label: "PDF File", widget: "file", required: false, default: "", media_folder: "assets/papers", public_folder: "../assets/papers" }
              - { name: "doi", label: "DOI URL", widget: "string", required: false, default: "" }
              - { name: "link", label: "External Link", widget: "string", required: false, default: "" }

      # --- Classes ---
      - name: "classes"
        label: "Classes"
        file: "_data/classes.yml"
        description: "Manage courses"
        fields:
          - name: "classes"
            label: "Classes"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { name: "title", label: "Course Title", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - name: "objectives"
                label: "Learning Objectives"
                widget: "list"
                required: false
                field: { name: "objective", label: "Objective", widget: "string" }
              - { name: "additional_description", label: "Additional Description", widget: "text", required: false, default: "" }
              - { name: "link", label: "Course Link", widget: "string", required: false, default: "" }

  # --- Blog Posts ---
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "date", label: "Date", widget: "datetime" }
      - { name: "image", label: "Featured Image", widget: "image", required: false }
      - { name: "image_alt", label: "Image Alt Text", widget: "string", required: false, default: "" }
      - { name: "body", label: "Body", widget: "markdown" }
