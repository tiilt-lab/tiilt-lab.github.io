# Monthly external-link check. Opens/updates a GitHub issue when links rot.
name: Check links

on:
  schedule:
    - cron: "0 8 1 * *" # first of the month, 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200..=299,301,302,303,307,308,403,429
            --max-concurrency 8
            --exclude-path scratch
            --exclude-path _site
            --exclude-path vendor
            "**/*.html" "_data/*.yml" "_posts/*.md"
          fail: false

      - name: Open or update issue
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "Broken links found by the monthly link check"
          content-filepath: ./lychee/out.md
          labels: link-rot, automated
