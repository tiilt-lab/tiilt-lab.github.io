name: Optimize uploaded images

on:
  push:
    branches: ["main"]
    paths:
      - "assets/img/people/**"

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install image tools
        run: sudo apt-get install -y imagemagick webp

      - name: Resize and compress images
        run: |
          cd assets/img/people
          changed=false
          for img in *.jpg *.jpeg *.png *.JPG *.JPEG *.PNG; do
            [ -f "$img" ] || continue
            # Check dimensions
            width=$(identify -format '%w' "$img")
            height=$(identify -format '%h' "$img")
            if [ "$width" -gt 600 ] || [ "$height" -gt 600 ]; then
              echo "Resizing $img (${width}x${height} -> 600x600 max)"
              convert "$img" -resize '600x600>' -quality 85 "$img"
              changed=true
            fi
          done

          if [ "$changed" = true ]; then
            echo "images_changed=true" >> $GITHUB_ENV
          fi

      - name: Commit optimized images
        if: env.images_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/img/people/
          git commit -m "chore: auto-optimize uploaded images"
          git push
