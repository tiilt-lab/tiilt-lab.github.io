projects:
  - name: "SportSense"
    description: "Recent estimates suggest that 70% of youth participate in sports, whereas fewer than 20% participate in out-of-school STEM experiences. SportSense imagines how unlocking new curiosities within athletes could transform the landscape of STEM learning, both in terms of who participates and types of innovations that emerge. In partnership with local organizations, we create learning environments where youth are introduced to ways that technology can help them improve their athletic performance, and ways that sports can improve their understanding of STEM concepts."
    status: "current"
    links:
      - label: "learn more"
        url: "./sportsense/index.html"
      - label: "BKP Sports"
        url: "https://www.blackkidspredict.org"

  - name: "Blinc"
    description: "This team works on developing data-capture devices that provide educators with real-time multimodal learning analytics. We use ReSpeaker Core v2.0 microphone arrays to show educators what keywords have been said, a discussion timeline, direction of speech, and emotional tone indicators. We are also working to incorporate body pose estimation into our analyses. We have tested our devices in multiple classrooms and are continuing development and testing in the coming months."
    status: "current"
    links:
      - label: "learn more"
        url: "./blinc/index.html"

  - name: "SportSense for Data Literacy"
    description: "SportSense for Data Literacy is an 8 week sports and data curriculum for fifth-grade students. The intention of this curriculum is to support students in learning and practicing data processes via their personal physical movement. The overarching framework used throughout the curriculum was a four-stage data process that was introduced to students at the start of the unit. Lessons use the Play Impossible Gameball, micro:bit, and Scratch. Below you can find the lesson plans and materials for each week."
    status: "current"
    links:
      - label: "learn more"
        url: "./sportsensefordata/index.html"
      - label: "SportSense Overview"
        url: "https://docs.google.com/document/d/1aku6Bz6hKWT9OaoNX-y0WtMKkF6DQgNLg3iSTDYePz4/edit?tab=t.0"

  - name: "Global Aid Refugees (GAR)"
    description: "Global Aid Refugees (GAR, pseudonym) works with tiilt to implement maker culture activities in after school and summer programming for refugee children ages 5-17 years old. Past activities include making games to creating tactile picture books using low and high tech fabrication tools and materials. This collaboration ran throughout the school year and during the summer."
    status: "current"
    links: []

  - name: "Learning with Minecraft"
    description: "Many in the media and the academia have touted Minecraft as a hotbed of learning. Learning with Minecraft studies how children might learn spatial reasoning and programming skills within and around the game. We are currently conducting a comparative study of student collaboration under two conditions: 1) Completing a construction task in a traditional Minecraft server; and 2) Using the MakeCode interface in Minecraft Education Edition. Additionally, we are using screen capture and eye tracking technologies to collect data and investigate spatial reasoning processes in Minecraft gameplay."
    status: "past"
    links:
      - label: "learn more"
        url: "./minecraft/index.html"

  - name: "Multicraft + Tangicraft"
    description: "Multicraft + Tangicraft works on multimodal interfaces to empower individuals with physical impairments to play and create in the popular video game Minecraft. Multicraft utilizes Gaze and Speech to replace the traditional mouse and keyboard interface. By looking at a location on the screen and uttering a command, users can build in the Minecraft world. Tangicraft utilizes tangible blocks with webcam detectable codes. Users can construct a physical structure in front of a webcam and call it in the Minecraft world by pressing a button on an Arduino microcontroller. Our team is currently conducting user tests to drive iteration on our initial designs."
    status: "past"
    links:
      - label: "learn more"
        url: "./multicraft/index.html"

  - name: "MusicNU"
    description: "MusicNU is an interactive website that will take a chosen Spotify song from a user, transform it into a visual display, and analyze the song's chord makeup, melody, rhythm, tempo, key, and other features to help students learn about music theory. Using Spotify's Web API to generate song analysis, Melodia and Sonic Visualizer to extract a song's melody, and AI/machine learning to identify chords, we will create a visual display of the song where users can learn about the music theory of the song in a fun, visual, and accessible way."
    status: "past"
    links: []

  - name: "IMR (Imagine, Make, Repeat)"
    description: "IMR (Imagine, Make, Repeat) works with educators to plan and implement Makerspace technologies and projects in classrooms and Makerspaces throughout Evanston and Chicago. IMR has appeared at STEMFest, YEA! festival, and has collaborated with Chute Middle School, MetaMedia at the Evanston YMCA, and the Evanston Public Library. Going forward, the IMR team looks to further develop and expand partnerships with educators and making communities across the Chicagoland area."
    status: "past"
    links:
      - label: "learn more"
        url: "./imr/index.html"

  - name: "FamJam!"
    description: "FamJam! engages children and their families in a making, learning, and bonding experience. Over three sessions, families use low- and high-tech tools to create a game based on a family narrative or story. We seek to understand how we can meaningfully engage families in \"making\" activities both in facilitated makerspaces and at home."
    status: "past"
    links:
      - label: "learn more"
        url: "./famjam/index.html"

  - name: "Mekatilili Fellowship Program"
    description: "The Mekatilili Fellowship Program is a project in collaboration with the MIT Media Lab. This project aims to support Kenyan students and professionals in developing technologies within the context of agriculture, accessibility, and design for manufacturing. We have partnered with three local Kenyan companies in order to allow the participants to design for real applications using the ESP8266 IoT boards and IBM Watson. The organizations work within the realms of accessibility, agriculture, and design for manufacturing. Some of the applications students began developing include auto-correcting humidity systems for growing crops, a system to save 3D print status in case of a power outage, and a stabilizing spoon. The aims of this project is to provide opportunities for students to apply their technical backgrounds in a real world setting and create lasting relationships with the local Kenyan partners to help support innovation."
    status: "past"
    links: []

  - name: "Tinkering with Music"
    description: "Tinkering with Music worked closely with a local afterschool youth club to develop activities that marry making with music appreciation. The curriculum invites middle school participants to build instruments and take part in collaborative active listening and discussion activities."
    status: "past"
    links: []
