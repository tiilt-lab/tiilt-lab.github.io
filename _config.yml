# Minimal Jekyll config — site is mostly static HTML.
# Only files with front matter (---) are processed by Liquid.
exclude:
  - README.md
  - scss
  - Gemfile
  - Gemfile.lock
  - node_modules
  - scripts

# Blog post permalink structure
permalink: /blog/:year/:month/:day/:title/

# Project detail pages, CMS-editable (see admin/config.yml)
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Site URL (used by jekyll-sitemap and jekyll-feed)
url: "https://tiilt.northwestern.edu"
title: tiilt Lab
description: Technological Innovations for Inclusive Learning and Teaching at Northwestern University

plugins:
  - jekyll-sitemap
  - jekyll-feed

# All blog posts use the post layout automatically
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
